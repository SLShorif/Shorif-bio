<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    body { 
        background: linear-gradient(135deg, #121212, #2c3e50); 
        color: white; 
        font-family: sans-serif; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .card { 
        background: #1e1e1e; 
        padding: 30px; 
        border-radius: 20px; 
        text-align: center; 
        max-width: 350px; 
        width: 90%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    img { 
        width: 110px; 
        height: 110px; 
        border-radius: 50%; 
        border: 3px solid #00ff88; 
        margin-bottom: 15px;
    }
    .btn { 
        display: block; 
        background: #00ff88; 
        color: #121212; 
        padding: 12px; 
        margin: 15px 0; 
        text-decoration: none; 
        border-radius: 10px; 
        font-weight: bold; 
        transition: all 0.3s ease; 
    }
    /* Hover Effect */
    .btn:hover {
        background: #00cc6e;
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
    }
    .btn:active {
        transform: scale(0.95);
    }
    .btn i { margin-right: 10px; }
</style>

     
</head>
<body>
    <div class="card">
        <img src="https://i.ibb.co/1tF4Hwvr/IMG-20260424-192657.jpg" alt="Profile">
        <h2>MD: S H O R I F</h2>
        <p>HSC Student & Entrepreneur</p>
        
        <a href="https://www.facebook.com/share/18Lmua6vNr/" class="btn"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a href="https://wa.me/8801796058921" class="btn"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
        <a href="https://www.instagram.com/sh.orif197?igsh=OWVmb3ZOMDYwaTlt" class="btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
    </div>
</body>
</html>
