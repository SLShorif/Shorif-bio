<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD:SHORIF | Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Animated Background Logic */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #121212);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Profile Card Style */
        .card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px); /* Glassmorphism Effect */
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            width: 85%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        h2 {
            color: white;
            margin: 10px 0;
            letter-spacing: 2px;
            font-style: italic;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Button Style */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00ff88;
            color: #121212;
            padding: 12px;
            margin: 15px 0;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .btn i {
            margin-right: 12px;
            font-size: 18px;
        }

        /* Hover Effects */
        .btn:hover {
            background: #00cc6e;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.ibb.co/1tF4Hwvr/IMG-20260424-192657.jpg" alt="MD:SHORIF">
        
        <h2>MD: S H O R I F</h2>
        <p>HSC Student & Entrepreneur</p>
        
        <a href="https://www.facebook.com/share/18Lmua6vNr/" class="btn" target="_blank">
            <i class="fa-brands fa-facebook"></i> Facebook
        </a>
        
        <a href="https://wa.me/8801796058921" class="btn" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        
        <a href="https://www.instagram.com/sh.orif197?igsh=OWVmb3ZOMDYwaTlt" class="btn" target="_blank">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>
    </div>

</body>
</html>
